apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: production
resources:
  - ../../base
images:
  - name: ghcr.io/lucianouziti/nfe-orchestrator
    newTag: latest
replicas:
  - name: nfe-orchestrator
    count: 1
patches:
  - target:
      kind: Deployment
      name: nfe-orchestrator
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: nfe-orchestrator
      spec:
        template:
          spec:
            containers:
            - name: nfe-orchestrator
              resources:
                requests:
                  cpu: "320m"
                  memory: "256Mi"
                limits:
                  cpu: "650m"
                  memory: "512Mi"
  